{% extends 'base.html' %}
{% load static %}
{% block container %}

<div class="content">
    <div class="row">
        <div class="col-md-12">
            <div class="card-body">
                <div class="typography-line">
                    <h3 class="color-typography"><span>{{ descripcion }}</span></h3>
                </div>
                <div id="stats" class="text-muted display-4" style= "font-size: 18px"></div>
                <div class="filter-controls-container">
                    <div class="date-filter-group">
                        <div class="calendar-button-wrapper">
                            <button class="calendar-button" id="dateRangeButton">
                                <span class="material-symbols-outlined me-2">
                                   📅
                                </span>
                                <span id="dateRangeText">01/01/2025 - 31/12/2025</span>
                            </button>
                            <input type="text" id="datePicker" class="d-none">
                        </div>

                        <div class="predefined-buttons">
                            <button class="predefined-btn" data-range="M">M</button>
                            <button class="predefined-btn" data-range="3M">3M</button>
                            <button class="predefined-btn" data-range="6M">6M</button>
                            <button class="predefined-btn" data-range="A">A</button>
                            <button class="predefined-btn active" data-range="Max">Máx</button>
                        </div>
                    </div>
                </div>

                <div class="toolbar mt-4">
                    <button onclick="showView('chart')" class="active">📈</button>
                    <button onclick="showView('stats')">📊</button>
                </div>
                
                <div id="chartView" class="view active">
                    <div id="chart" style="height: 300px;"></div>
                </div>
                <div id="statsView" class="view">
                    <div id="chart-bar" style="height: 300px;"></div>
                </div>
                
            </div>
        </div>
    </div>
</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.9/flatpickr.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.9/flatpickr.min.js"></script>
<script>

var varId = "{{ var_id }}";
var allData = [];

const datePicker = flatpickr("#datePicker", {
    mode: "range",
    dateFormat: "Y-m-d",
    onChange: function(selectedDates) {
        if (selectedDates.length === 2) {

            const startDate = flatpickr.formatDate(selectedDates[0], "Y-m-d");
            const endDate = flatpickr.formatDate(selectedDates[1], "Y-m-d");

            document.getElementById('dateRangeText').textContent =
                `${flatpickr.formatDate(selectedDates[0], "d/m/Y")} - ${flatpickr.formatDate(selectedDates[1], "d/m/Y")}`;

            document.querySelectorAll('.predefined-btn').forEach(btn => btn.classList.remove('active'));

            applyFilter(startDate, endDate);
        }
    }
});


document.getElementById('dateRangeButton').addEventListener('click', function() {
    datePicker.open();
});


var line = new ApexCharts(document.querySelector("#chart"), {
    chart: { type: 'line', height: 550 },
    stroke: { curve: 'smooth', width: 3 },
    markers: { size: 0 },
    colors: ['#007bff'],
    dataLabels: { enabled: false },
    series: [],
    xaxis: { categories: [] },
    noData: { text: "Cargando..." }
});
line.render();


var chart = new ApexCharts(document.querySelector("#chart-bar"), {
    chart: { type: 'bar', height: 550 },
    stroke: { curve: 'smooth', width: 2 },
    markers: { size: 0 },
    colors: ['#007bff'],
    dataLabels: { enabled: false },
    series: [],
    xaxis: { categories: [] },
    noData: { text: "Cargando..." }
});
chart.render();


function updateCharts(data, description) {

    if (!data || data.length === 0) {
        chart.updateSeries([{ name: description, data: [] }]);
        line.updateSeries([{ name: description, data: [] }]);
        document.getElementById("stats").innerHTML = "No hay datos para el rango seleccionado.";
        return;
    }

    var sorted = data.sort((a, b) => new Date(a.fecha) - new Date(b.fecha));

    var fechas = sorted.map(item => item.fecha);
    var valores = sorted.map(item => parseFloat(item.valor));

    chart.updateOptions({ xaxis: { categories: fechas } });
    chart.updateSeries([{ name: description, data: valores }]);

    line.updateOptions({ xaxis: { categories: fechas } });
    line.updateSeries([{ name: description, data: valores }]);

    let ultimo = valores[valores.length - 1];
    let promedio = (valores.reduce((a,b)=>a+b,0)/valores.length).toFixed(2);
    let variacion = (((ultimo - valores[0]) / valores[0]) * 100).toFixed(2);

    document.getElementById("stats").innerHTML =
        `Último dato: <b>${ultimo}</b> • Promedio: ${promedio} • Variación: ${variacion}%`;
}


function applyFilter(startDate, endDate) {

    if (!allData || allData.length === 0) return;

    const filteredData = allData.filter(item => {
        return item.fecha >= startDate && item.fecha <= endDate;
    });

    updateCharts(filteredData, "Serie");
}


async function loadData(id) {

    let offset = 0;
    let limit = 1000;
    let moreData = true;

    allData = [];

    while (moreData) {

        let url = `https://api.bcra.gob.ar/estadisticas/v4.0/monetarias/${id}?limit=${limit}&offset=${offset}`;

        try {

            let response = await fetch(url);
            let json = await response.json();

            if (json.results && json.results.length > 0) {

                let detalle = json.results[0].detalle;

                if (detalle && detalle.length > 0) {

                    allData = allData.concat(detalle);

                    if (detalle.length < limit) {
                        moreData = false;
                    } else {
                        offset += limit;
                    }

                } else {
                    moreData = false;
                }

            } else {
                moreData = false;
            }

        } catch (error) {

            console.error("Error API BCRA:", error);
            moreData = false;

        }

    }

    console.log("Total datos cargados:", allData.length);

    const today = new Date();
    const startOfYear = new Date(today.getFullYear(), 0, 1).toISOString().split('T')[0];
    const endOfYear = new Date(today.getFullYear(), 11, 31).toISOString().split('T')[0];

    applyFilter(startOfYear, endOfYear);

    document.getElementById('dateRangeText').textContent =
        `01/01/${today.getFullYear()} - 31/12/${today.getFullYear()}`;
}


document.querySelectorAll('.predefined-btn').forEach(button => {

    button.addEventListener('click', function() {

        document.querySelectorAll('.predefined-btn').forEach(btn => btn.classList.remove('active'));
        this.classList.add('active');

        const range = this.getAttribute('data-range');

        const today = new Date();
        let startDate;
        let endDate = today.toISOString().split('T')[0];

        if (range === 'M') today.setMonth(today.getMonth() - 1);
        if (range === '3M') today.setMonth(today.getMonth() - 3);
        if (range === '6M') today.setMonth(today.getMonth() - 6);
        if (range === 'A') today.setFullYear(today.getFullYear() - 1);

        if (range === 'Max') {

            const firstDate = allData.length > 0 ? allData[0].fecha : '1900-01-01';

            startDate = firstDate;

            document.getElementById('dateRangeText').textContent = "Máximo";

            applyFilter(startDate, endDate);

            return;
        }

        startDate = today.toISOString().split('T')[0];

        document.getElementById('dateRangeText').textContent =
            `${flatpickr.formatDate(new Date(startDate), "d/m/Y")} - ${flatpickr.formatDate(new Date(endDate), "d/m/Y")}`;

        applyFilter(startDate, endDate);

    });

});


loadData(varId);

</script>
{% endblock container %}
